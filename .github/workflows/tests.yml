name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The dataset tests in tests/unit/test_datasets.py download real benchmark
      # graphs from OSF. Caching the download dir keeps CI fast after the first run.
      - name: Cache benchmark datasets
        uses: actions/cache@v4
        with:
          path: /tmp/gdMetriX_d207f7c5-18c9-4840-8945-2e81eb582ce5
          key: gdmetrix-osf-datasets-v1

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && pip install -e ".[test]"

      # Tests marked `slow` (integration tests + stress tests) are skipped by default.
      - name: Run tests with coverage
        run: pytest --cov=gdMetriX --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
